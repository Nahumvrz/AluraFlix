<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AluraFlix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="profile-selection">
            <h1>Quem está assistindo?</h1>
            
            <ul class="profiles-list">
    
                <li class="profile-item">
                    <a href="catalogo/catalogo.html" class="profile-link">
                        <ol class="profile-content-list">
                            <li>
                                <img src="/assets/perfil 1.jpg" alt="Close-up do personagem Frodo Bolseiro...">
                            </li>
                            <li>
                                <span>Matheus</span>
                            </li>
                        </ol>
                    </a>
                </li>
                
                <li class="profile-item">
                    <a href="catalogo/catalogo.html" class="profile-link">
                        <ol class="profile-content-list">
                            <li>
                                <img src="/assets/Perfil 2.jpg" alt="Arwen de O Senhor dos Anéis...">
                            </li>
                            <li>
                                <span>Felipe</span>
                            </li>
                        </ol>
                    </a>
                </li>

                <li class="profile-item">
                    <a href="catalogo/catalogo.html" class="profile-link">
                        <ol class="profile-content-list">
                            <li>
                                <img src="/assets/Perfil 3.jpg" alt="Avatar do perfil Jack">
                            </li>
                            <li>
                                <span>José</span>
                            </li>
                        </ol>
                    </a>
                </li>
                
                <li class="profile-item">
                    <a href="catalogo/catalogo.html" class="profile-link">
                        <ol class="profile-content-list">
                            <li>
                                <img src="/assets/Perfil 4.jpg" alt="Avatar do perfil Artemis">
                            </li>
                            <li>
                                <span>Samantha</span>
                            </li>
                        </ol>
                    </a>
                </li>
                    
            </ul>

            <button class="manage-profiles">Gerenciar perfis</button>
        </section>
    </main>
    <div class="theme-switch-wrapper">
        <button id="theme-icon-btn" class="theme-icon-btn" aria-label="Alternar tema claro/escuro">
            <span class="icon">🌙</span>
        </button>
    </div>
    <script src="script.js"></script>
</body>
</html>
